name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  opa-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa
          sudo mv opa /usr/local/bin/

      - name: Run policy tests
        run: opa test policy/ tests/ -v

      - name: Smoke-test compliant example
        run: |
          result=$(opa eval -d policy/ -i examples/compliant.yaml 'data.ai.rmf.deny')
          echo "$result"
          # The result should evaluate to an empty set
          echo "$result" | grep -q '"value": \[\]' || (echo "compliant example should produce no violations" && exit 1)

      - name: Smoke-test non-compliant example
        run: |
          result=$(opa eval -d policy/ -i examples/missing-evals.yaml 'data.ai.rmf.deny')
          echo "$result"
          # Should contain the eval_set_required citation
          echo "$result" | grep -q 'eval_set_required' || (echo "missing-evals example should fail eval_set_required" && exit 1)
